name: CF-DNS-Update-Emby
on:
  schedule:
    - cron: '*/30 * * * *'  # 每30分钟执行
  workflow_dispatch:        # 手动触发

jobs:
  update-dns:
    runs-on: ubuntu-latest
    steps:
      - name: 安装依赖
        run: sudo apt update -y && sudo apt install -y bc

      - name: 筛选支持Emby + 下载速度最快的CF IP
        id: get-ip
        run: |
          ips=(
            "172.64.149.222"
            "108.162.198.89"
            "172.64.144.253"
            "172.64.52.15"
            "172.64.156.121"
            "172.64.34.19"
            "172.64.38.29"
            "172.64.35.5"
            "162.159.62.25"
            "162.159.49.168"
            "162.159.38.196"
            "172.64.229.157"
            "162.159.39.99"
            "172.64.52.228"
            "172.64.53.250"
            "162.159.45.118"
            "108.162.198.150"
            "172.64.152.156"
            "172.64.42.0"
            "172.64.229.141"
            "162.159.58.102"
            "172.64.151.95"
            "172.64.146.239"
            "172.64.154.158"
            "172.64.149.46"
            "172.64.35.83"
            "162.159.40.28"
            "162.159.61.225"
            "108.162.196.35"
            "162.159.46.151"
            "162.159.41.38"
            "172.64.146.223"
            "172.64.147.176"
            "162.159.40.235"
            "172.64.229.166"
            "162.159.49.16"
            "162.159.58.200"
            "172.64.156.225"
            "172.64.151.49"
            "162.159.40.50"
            "108.162.194.37"
            "172.64.49.55"
            "162.159.41.172"
            "172.64.229.241"
            "162.159.40.171"
            "162.159.61.226"
            "172.64.48.117"
            "172.64.32.230"
            "162.159.43.213"
            "172.64.49.16"
          )

          fastest_ip="172.64.229.141"
          max_speed=0
          EMBY_DOMAIN="gzxgzxgzx.de5.net"

          for ip in "${ips[@]}"; do
            echo "====================================="
            echo "测试IP：$ip"

            # 验证 Emby 可用性
            curl -sf --connect-timeout 4 --max-time 8 \
              --resolve "$EMBY_DOMAIN:443:$ip" \
              "https://$EMBY_DOMAIN/emby/System/Info/Public" > /dev/null

            if [ $? -ne 0 ]; then
              echo "❌ 不支持 Emby，跳过"
              continue
            fi

            echo "✅ 支持 Emby，开始测速..."

            # 测速（5MB）
            speed=$(curl -o /dev/null -s -w "%{speed_download}" \
              --connect-timeout 4 --max-time 10 \
              --resolve "speed.cloudflare.com:443:$ip" \
              "https://speed.cloudflare.com/__down?bytes=5242880" || echo 0)

            speed_mb=$(echo "scale=2; $speed / 1024 / 1024" | bc)
            echo "⚡ 下载速度：$speed_mb MB/s"

            # 选最快
            if (( $(echo "$speed > $max_speed" | bc -l) )); then
              max_speed=$speed
              fastest_ip=$ip
              echo "🏆 成为当前最快IP"
            fi
          done

          echo "====================================="
          echo "最终选中IP：$fastest_ip"
          echo "fast_ip=$fastest_ip" >> $GITHUB_OUTPUT

      - name: 更新 Cloudflare DNS
        run: |
          curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/dns_records/${{ secrets.CF_RECORD_ID }}" \
            -H "Authorization: Bearer ${{ secrets.CF_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "type":"A",
              "name":"gzxgzxgzx.de5.net",
              "content":"${{ steps.get-ip.outputs.fast_ip }}",
              "ttl":1,
              "proxied":false
            }'
          echo "✅ DNS 更新完成：${{ steps.get-ip.outputs.fast_ip }}"
