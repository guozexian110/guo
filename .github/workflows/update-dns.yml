name: CF-DNS-Update-Emby
on:
  schedule:
    - cron: '*/30 * * * *'  # 每30分钟执行
  workflow_dispatch:        # 手动触发

jobs:
  update-dns:
    runs-on: ubuntu-latest
    steps:
      - name: 安装依赖
        run: sudo apt update -y && sudo apt install -y bc

      - name: 筛选【电信+移动双网都快】且支持Emby的CF IP
        id: get-ip
        run: |
          # 完整保留你的所有CF IP（已去重）
          ips=(
            "172.64.149.222"
            "108.162.198.89"
            "172.64.144.253"
            "172.64.52.15"
            "172.64.156.121"
            "172.64.34.19"
            "172.64.38.29"
            "172.64.35.5"
            "162.159.62.25"
            "162.159.49.168"
            "162.159.38.196"
            "172.64.229.157"
            "162.159.39.99"
            "172.64.52.228"
            "172.64.53.250"
            "162.159.45.118"
            "108.162.198.150"
            "172.64.152.156"
            "172.64.42.0"
            "172.64.229.141"
            "162.159.58.102"
            "172.64.151.95"
            "172.64.146.239"
            "172.64.154.158"
            "172.64.149.46"
            "172.64.35.83"
            "162.159.40.28"
            "162.159.61.225"
            "108.162.196.35"
            "162.159.46.151"
            "162.159.41.38"
            "172.64.146.223"
            "172.64.147.176"
            "162.159.40.235"
            "172.64.229.166"
            "162.159.49.16"
            "162.159.58.200"
            "172.64.156.225"
            "172.64.151.49"
            "162.159.40.50"
            "108.162.194.37"
            "172.64.49.55"
            "162.159.41.172"
            "172.64.229.241"
            "162.159.40.171"
            "162.159.61.226"
            "172.64.48.117"
            "172.64.32.230"
            "162.159.43.213"
            "172.64.49.16"
          )

          # 配置项（完全保留你的习惯）
          fastest_ip="172.64.229.141"  # 兜底IP
          max_avg_speed=0
          EMBY_DOMAIN="gzxgzxgzx.de5.net"  # 你的Emby域名
          MIN_SPEED_THRESHOLD=1  # 单线路最低速度阈值（MB/s），低于直接跳过

          # 双网测速节点（国内运营商真实测速节点，比改DNS准100倍）
          # 电信测速节点：南京电信10MB测试文件
          TELECOM_TEST_URL="http://58.223.2.154:8080/10MB"
          # 移动测速节点：广州移动10MB测试文件
          MOBILE_TEST_URL="http://211.136.162.12:8080/10MB"

          # 循环测试每个IP
          for ip in "${ips[@]}"; do
            echo "====================================="
            echo "测试IP：$ip"

            # 步骤1：验证Emby可用性（完全保留你的逻辑）
            curl -sf --connect-timeout 4 --max-time 8 \
              --resolve "$EMBY_DOMAIN:443:$ip" \
              "https://$EMBY_DOMAIN/emby/System/Info/Public" > /dev/null

            if [ $? -ne 0 ]; then
              echo "❌ 不支持Emby，跳过"
              continue
            fi
            echo "✅ 支持Emby，开始双网测速..."

            # 步骤2：电信线路测速（绑定当前IP，真实测国内电信速度）
            telecom_host=$(echo $TELECOM_TEST_URL | awk -F/ '{print $3}')
            telecom_port=$(echo $telecom_host | awk -F: '{print $2}')
            telecom_host=$(echo $telecom_host | awk -F: '{print $1}')
            telecom_speed=$(curl -o /dev/null -s -w "%{speed_download}" \
              --connect-timeout 5 --max-time 10 \
              --resolve "$telecom_host:$telecom_port:$ip" \
              "$TELECOM_TEST_URL" 2>/dev/null || echo 0)
            telecom_speed_mb=$(echo "scale=2; $telecom_speed / 1024 / 1024" | bc)
            
            # 电信速度不达标，跳过
            if (( $(echo "$telecom_speed_mb < $MIN_SPEED_THRESHOLD" | bc -l) )); then
              echo "→ 电信速度不达标：$telecom_speed_mb MB/s，跳过"
              continue
            fi
            echo "→ 电信测速：$telecom_speed_mb MB/s"

            # 步骤3：移动线路测速（绑定当前IP，真实测国内移动速度）
            mobile_host=$(echo $MOBILE_TEST_URL | awk -F/ '{print $3}')
            mobile_port=$(echo $mobile_host | awk -F: '{print $2}')
            mobile_host=$(echo $mobile_host | awk -F: '{print $1}')
            mobile_speed=$(curl -o /dev/null -s -w "%{speed_download}" \
              --connect-timeout 5 --max-time 10 \
              --resolve "$mobile_host:$mobile_port:$ip" \
              "$MOBILE_TEST_URL" 2>/dev/null || echo 0)
            mobile_speed_mb=$(echo "scale=2; $mobile_speed / 1024 / 1024" | bc)
            
            # 移动速度不达标，跳过
            if (( $(echo "$mobile_speed_mb < $MIN_SPEED_THRESHOLD" | bc -l) )); then
              echo "→ 移动速度不达标：$mobile_speed_mb MB/s，跳过"
              continue
            fi
            echo "→ 移动测速：$mobile_speed_mb MB/s"

            # 步骤4：计算双网平均速度，选平均最快的
            avg_speed=$(echo "scale=2; ($telecom_speed + $mobile_speed) / 2" | bc)
            avg_speed_mb=$(echo "scale=2; $avg_speed / 1024 / 1024" | bc)
            echo "→ 双网平均速度：$avg_speed_mb MB/s"

            # 步骤5：更新最快IP
            if (( $(echo "$avg_speed > $max_avg_speed" | bc -l) )); then
              max_avg_speed=$avg_speed
              fastest_ip=$ip
              echo "🏆 成为当前双网最快IP"
            fi
          done

          # 输出最终结果
          echo "====================================="
          echo "最终选中双网最快IP：$fastest_ip"
          echo "fast_ip=$fastest_ip" >> $GITHUB_OUTPUT

      - name: 更新Cloudflare DNS记录
        run: |
          curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/dns_records/${{ secrets.CF_RECORD_ID }}" \
            -H "Authorization: Bearer ${{ secrets.CF_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "type":"A",
              "name":"gzxgzxgzx.de5.net",
              "content":"${{ steps.get-ip.outputs.fast_ip }}",
              "ttl":1,
              "proxied":false
            }'
          echo "✅ DNS更新完成，当前解析IP：${{ steps.get-ip.outputs.fast_ip }}"
