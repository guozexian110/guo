name: CF-DNS-Update-Emby
on:
  schedule:
    - cron: '*/30 * * * *'  # 每30分钟执行
  workflow_dispatch:        # 手动触发

jobs:
  update-dns:
    runs-on: ubuntu-latest
    steps:
      - name: 安装依赖
        run: sudo apt update -y && sudo apt install -y bc

      - name: 筛选【双网稳定+支持Emby】的最快CF IP
        id: get-ip
        run: |
          # 完整保留你的所有CF IP
          ips=(
            "172.64.149.222"
            "108.162.198.89"
            "172.64.144.253"
            "172.64.52.15"
            "172.64.156.121"
            "172.64.34.19"
            "172.64.38.29"
            "172.64.35.5"
            "162.159.62.25"
            "162.159.49.168"
            "162.159.38.196"
            "172.64.229.157"
            "162.159.39.99"
            "172.64.52.228"
            "172.64.53.250"
            "162.159.45.118"
            "108.162.198.150"
            "172.64.152.156"
            "172.64.42.0"
            "172.64.229.141"
            "162.159.58.102"
            "172.64.151.95"
            "172.64.146.239"
            "172.64.154.158"
            "172.64.149.46"
            "172.64.35.83"
            "162.159.40.28"
            "162.159.61.225"
            "108.162.196.35"
            "162.159.46.151"
            "162.159.41.38"
            "172.64.146.223"
            "172.64.147.176"
            "162.159.40.235"
            "172.64.229.166"
            "162.159.49.16"
            "162.159.58.200"
            "172.64.156.225"
            "172.64.151.49"
            "162.159.40.50"
            "108.162.194.37"
            "172.64.49.55"
            "162.159.41.172"
            "172.64.229.241"
            "162.159.40.171"
            "162.159.61.226"
            "172.64.48.117"
            "172.64.32.230"
            "162.159.43.213"
            "172.64.49.16"
          )

          # 配置项
          fastest_ip="172.64.229.141"  # 兜底IP（你本地确认可用的）
          max_avg_speed=0
          EMBY_DOMAIN="gzxgzxgzx.de5.net"  # 你的Emby域名
          MIN_SPEED_THRESHOLD=0.5  # 最低速度阈值

          # 双网测速节点（Cloudflare官方节点，稳定不报错）
          TEST_URL_1="https://speed.cloudflare.com/__down?bytes=5242880"
          TEST_URL_2="https://speedtest.london.cloudflare.com/__down?bytes=5242880"

          # 循环测试每个IP
          for ip in "${ips[@]}"; do
            echo "====================================="
            echo "测试IP：$ip"

            # -------------------------- 修复后的Emby验证逻辑 --------------------------
            # 加了-k忽略SSL验证、延长超时、输出详细错误日志，解决海外误判
            emby_response=$(curl -s -w "\n%{http_code}|%{exitcode}" -k --connect-timeout 8 --max-time 12 \
              --resolve "$EMBY_DOMAIN:443:$ip" \
              "https://$EMBY_DOMAIN/emby/System/Info/Public" 2>&1)
            
            http_code=$(echo "$emby_response" | tail -n1 | awk -F'|' '{print $1}')
            exit_code=$(echo "$emby_response" | tail -n1 | awk -F'|' '{print $2}')
            emby_body=$(echo "$emby_response" | head -n -1)

            echo "Emby验证：退出码=$exit_code，HTTP状态码=$http_code"
            
            # 放宽验证规则：只要HTTP状态码是200/401/403，都算支持Emby（401/403说明服务存在，只是需要登录，是正常的）
            if [ "$exit_code" -ne 0 ] && ! [[ "$http_code" =~ ^(200|401|403)$ ]]; then
              echo "❌ 不支持Emby，跳过（服务不可达）"
              continue
            fi
            echo "✅ 支持Emby，开始双网测速..."
            # -------------------------------------------------------------------------

            # 线路1测速
            host1=$(echo $TEST_URL_1 | awk -F/ '{print $3}')
            speed1=$(curl -o /dev/null -s -w "%{speed_download}" \
              --connect-timeout 4 --max-time 8 \
              --resolve "$host1:443:$ip" \
              "$TEST_URL_1" 2>/dev/null || echo 0)
            speed1_mb=$(echo "scale=2; $speed1 / 1024 / 1024" | bc 2>/dev/null || echo 0)
            
            if (( $(echo "$speed1_mb < $MIN_SPEED_THRESHOLD" | bc -l 2>/dev/null) )); then
              echo "→ 线路1速度不达标：$speed1_mb MB/s，跳过"
              continue
            fi
            echo "→ 线路1测速：$speed1_mb MB/s"

            # 线路2测速
            host2=$(echo $TEST_URL_2 | awk -F/ '{print $3}')
            speed2=$(curl -o /dev/null -s -w "%{speed_download}" \
              --connect-timeout 4 --max-time 8 \
              --resolve "$host2:443:$ip" \
              "$TEST_URL_2" 2>/dev/null || echo 0)
            speed2_mb=$(echo "scale=2; $speed2 / 1024 / 1024" | bc 2>/dev/null || echo 0)
            
            if (( $(echo "$speed2_mb < $MIN_SPEED_THRESHOLD" | bc -l 2>/dev/null) )); then
              echo "→ 线路2速度不达标：$speed2_mb MB/s，跳过"
              continue
            fi
            echo "→ 线路2测速：$speed2_mb MB/s"

            # 计算双网平均速度
            avg_speed=$(echo "scale=2; ($speed1 + $speed2) / 2" | bc 2>/dev/null || echo 0)
            avg_speed_mb=$(echo "scale=2; $avg_speed / 1024 / 1024" | bc 2>/dev/null || echo 0)
            echo "→ 双网平均速度：$avg_speed_mb MB/s"

            # 更新最快IP
            if (( $(echo "$avg_speed > $max_avg_speed" | bc -l 2>/dev/null) )); then
              max_avg_speed=$avg_speed
              fastest_ip=$ip
              echo "🏆 成为当前双网最快IP"
            fi
          done

          # 输出最终结果
          echo "====================================="
          echo "最终选中双网最快IP：$fastest_ip"
          echo "fast_ip=$fastest_ip" >> $GITHUB_OUTPUT

      - name: 更新Cloudflare DNS记录
        run: |
          response=$(curl -s -w "\n%{http_code}" -X PUT "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/dns_records/${{ secrets.CF_RECORD_ID }}" \
            -H "Authorization: Bearer ${{ secrets.CF_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "type":"A",
              "name":"gzxgzxgzx.de5.net",
              "content":"${{ steps.get-ip.outputs.fast_ip }}",
              "ttl":1,
              "proxied":false
            }')
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n -1)
          
          echo "DNS更新请求状态码：$http_code"
          echo "返回结果：$body"
          
          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "✅ DNS更新完成，当前解析IP：${{ steps.get-ip.outputs.fast_ip }}"
          else
            echo "⚠️ DNS更新请求异常"
            exit 0
          fi
